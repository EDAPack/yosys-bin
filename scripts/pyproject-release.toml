[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "yosys-bin"
version = "%%VERSION%%"
dependencies = [
    "dv-flow-mgr",
]
authors = [
    {name = "Matthew Ballance", email = "matt.ballance@gmail.com"},
]
description = "Yosys binary distribution with Python bindings (pyosys)"
license = {file = "LICENSE"}

[project.entry-points."dv_flow.mgr"]
libyosys = "dv_flow.libyosys.__ext__"

# Flat layout: both pyosys/ and dv_flow/ sit directly at the release root.
# Explicitly enumerate packages to avoid setuptools flat-layout auto-discovery
# refusing to build when non-package directories (lib/, share/) are also present.
[tool.setuptools]
packages = ["pyosys", "dv_flow", "dv_flow.libyosys"]

[tool.setuptools.package-data]
"pyosys"           = ["*.so", "yosys-abc", "share/**/*"]
"dv_flow.libyosys" = ["flow.dv", "share/**/*"]
